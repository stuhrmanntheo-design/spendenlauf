<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spendenlauf – Eingabe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            padding: 40px 32px;
            width: 100%;
            max-width: 480px;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="number"] {
            width: 100%;
            padding: 16px 18px;
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
            color: #1a202c;
            margin-bottom: 20px;
            -moz-appearance: textfield;
        }

        input::-webkit-inner-spin-button,
        input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        input:focus {
            border-color: #4299e1;
        }

        button.submit {
            width: 100%;
            padding: 22px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button.submit:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        button.submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #c6f6d5;
            color: #276749;
            display: block;
        }

        .message.error {
            background: #fed7d7;
            color: #c53030;
            display: block;
        }

        /* --- Toast-Benachrichtigungen für Hintergrund-Fehler --- */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            background: #2d3748;
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            opacity: 0;
            transform: translateX(40px);
            animation: toastIn 0.3s ease forwards;
            max-width: 340px;
        }

        .toast.toast-error {
            background: #c53030;
        }

        .toast.toast-retry {
            background: #b7791f;
        }

        .toast.toast-recovered {
            background: #276749;
        }

        .toast.toast-out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateX(40px); }
        }

        /* --- Queue-Status-Indikator --- */
        .queue-status {
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
            min-height: 18px;
            transition: opacity 0.3s;
        }

        .queue-status.active {
            color: #b7791f;
        }

        .recent {
            margin-top: 28px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .recent h2 {
            font-size: 13px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .recent-list {
            list-style: none;
        }

        .recent-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f7fafc;
            font-size: 15px;
        }

        .recent-list li:last-child {
            border-bottom: none;
        }

        .recent-list .nr {
            font-weight: 700;
            color: #2d3748;
        }

        .recent-list .ts {
            color: #a0aec0;
            font-size: 12px;
        }

        .recent-list .status {
            font-size: 11px;
            margin-left: 6px;
        }

        .recent-list .status.pending {
            color: #b7791f;
        }

        .recent-list .status.sent {
            color: #276749;
        }

        .recent-list .status.failed {
            color: #c53030;
        }
    </style>
</head>

<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="card">
        <div class="logo">🏃</div>
        <h1>Stempelstation</h1>
        <p class="subtitle">Startnummer des Läufers eingeben</p>

        <form id="form" onsubmit="submitEntry(event)">
            <label for="startnummer">Startnummer</label>
            <input type="number" id="startnummer" placeholder="42" min="1" required autofocus />
            <button type="submit" class="submit" id="submitBtn">✓ Runde eintragen</button>
        </form>

        <div class="message" id="message"></div>
        <div class="queue-status" id="queueStatus"></div>

        <div class="recent">
            <h2>Zuletzt eingetragen</h2>
            <ul class="recent-list" id="recentList">
                <li style="color:#a0aec0; font-size:14px;">Noch keine Einträge.</li>
            </ul>
        </div>
    </div>

    <script>
        // ← Deine Google Apps Script URL hier eintragen!
        const API_URL = "https://script.google.com/macros/s/AKfycbxzTuWHBF8WfrPv_7Z6HhHfi3paJ2oMPgX-klblD6IRU0UfkYuVgbdVAIyNzdIkUWODsA/exec";

        const recent = [];

        // ── Retry-Queue ──────────────────────────────────────
        const MAX_RETRIES = 3;
        const BASE_DELAY_MS = 1500;      // 1.5s → 3s → 6s (exponential backoff)
        const sendQueue = [];             // { startnummer, retries, id }
        let queueProcessing = false;

        function enqueue(startnummer) {
            const id = Date.now() + '-' + Math.random().toString(36).slice(2, 6);
            sendQueue.push({ startnummer, retries: 0, id });
            processQueue();
            return id;
        }

        async function processQueue() {
            if (queueProcessing || sendQueue.length === 0) return;
            queueProcessing = true;
            updateQueueStatus();

            while (sendQueue.length > 0) {
                const item = sendQueue[0];
                try {
                    await fetch(
                        `${API_URL}?action=eintragen&startnummer=${encodeURIComponent(item.startnummer)}`,
                        { redirect: "follow", mode: "no-cors" }
                    );
                    // no-cors → kein lesbarer Response, Erfolg annehmen
                    sendQueue.shift();
                    updateRecentStatus(item.id, 'sent');
                    if (item.retries > 0) {
                        showToast(`#${item.startnummer} nachträglich gesendet ✓`, 'recovered');
                    }
                } catch (err) {
                    item.retries++;
                    if (item.retries >= MAX_RETRIES) {
                        sendQueue.shift();
                        updateRecentStatus(item.id, 'failed');
                        showToast(`#${item.startnummer} konnte nicht gesendet werden (${MAX_RETRIES}× versucht)`, 'error');
                    } else {
                        showToast(`#${item.startnummer} – Retry ${item.retries}/${MAX_RETRIES}…`, 'retry');
                        const delay = BASE_DELAY_MS * Math.pow(2, item.retries - 1);
                        await sleep(delay);
                    }
                }
                updateQueueStatus();
            }

            queueProcessing = false;
            updateQueueStatus();
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function updateQueueStatus() {
            const el = document.getElementById('queueStatus');
            if (sendQueue.length === 0) {
                el.textContent = '';
                el.classList.remove('active');
            } else {
                el.textContent = `⏳ ${sendQueue.length} ${sendQueue.length === 1 ? 'Eintrag wird' : 'Einträge werden'} gesendet…`;
                el.classList.add('active');
            }
        }

        // ── Toast-Benachrichtigungen ─────────────────────────
        function showToast(text, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = text;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('toast-out');
                toast.addEventListener('animationend', () => toast.remove());
            }, 4000);
        }

        // ── Hauptlogik: Fire-and-Forget ──────────────────────
        function submitEntry(e) {
            e.preventDefault();
            const input = document.getElementById("startnummer");
            const startnummer = input.value.trim();
            if (!startnummer) return;

            // Sofort: UI-Feedback, Feld leeren, Fokus zurück
            const now = new Date().toLocaleTimeString("de-DE");
            showMessage(`✓ Startnummer ${startnummer} – Runde eingetragen!`, "success");
            const queueId = enqueue(startnummer);
            addRecent(startnummer, now, queueId);
            document.getElementById("form").reset();
            input.focus();

            // Button wird NIE blockiert – sofort bereit für nächste Eingabe
        }

        function showMessage(text, type) {
            const el = document.getElementById("message");
            el.textContent = text;
            el.className = "message " + type;
            setTimeout(() => { el.className = "message"; }, 2500);
        }

        function addRecent(nr, ts, id) {
            recent.unshift({ nr, ts, id, status: 'pending' });
            if (recent.length > 8) recent.pop();
            renderRecent();
        }

        function updateRecentStatus(id, status) {
            const entry = recent.find(r => r.id === id);
            if (entry) {
                entry.status = status;
                renderRecent();
            }
        }

        function renderRecent() {
            const statusIcons = { pending: '⏳', sent: '✓', failed: '✗' };
            document.getElementById("recentList").innerHTML = recent.map(r => {
                const icon = statusIcons[r.status] || '';
                return `<li>
                    <span class="nr">#${r.nr} <span class="status ${r.status}">${icon}</span></span>
                    <span class="ts">${r.ts}</span>
                </li>`;
            }).join("");
        }
    </script>

</body>

</html>
